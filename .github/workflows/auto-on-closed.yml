name: auto-on-closed

on:
  issues:
    types: [closed]

jobs:
  # Skip on the unconfigured template repo (ships only *.example.json).
  # A real deployment commits config/board.json, which flips `configured` to 'true'.
  gate:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        uses: ./.github/actions/check-configured

  handle-close:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.configured == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Check who closed the issue
        id: check
        uses: ./.github/actions/check-role
        with:
          username: ${{ github.event.sender.login }}

      - name: Set status to Done
        if: steps.check.outputs.is-reviewer == 'true'
        uses: ./.github/actions/set-project-status
        with:
          issue-node-id: ${{ github.event.issue.node_id }}
          status: Done
          github-token: ${{ secrets.PROJECT_TOKEN }}

      - name: Post completion comment
        if: steps.check.outputs.is-reviewer == 'true'
        uses: ./.github/actions/comment-on-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "🎉 Your Sandbox Project module **${{ github.event.issue.title }}** is **DONE**! The updated status will be shown on the dashboard."

      - name: Reopen and notify if closed by student
        if: steps.check.outputs.is-reviewer == 'false'
        uses: ./.github/actions/comment-on-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "Hi @${{ github.event.sender.login }}, only a reviewer can close a ticket. This issue has been reopened automatically."

      - name: Reopen issue
        if: steps.check.outputs.is-reviewer == 'false'
        uses: ./.github/actions/reopen-issue
        with:
          issue-number: ${{ github.event.issue.number }}
