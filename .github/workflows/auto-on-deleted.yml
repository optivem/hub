name: auto-on-deleted

# An issue was deleted. Nothing to reconcile on the board (the item goes with
# it), but log the deletion for the audit trail; the dashboard refreshes via the
# dashboard workflow's workflow_run trigger.

on:
  issues:
    types: [deleted]

jobs:
  # Skip on the unconfigured template repo (ships only *.example.json).
  # A real deployment commits config/board.json, which flips `configured` to 'true'.
  gate:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        uses: ./.github/actions/check-configured

  log-deletion:
    needs: gate
    if: needs.gate.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log deleted issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          echo "Issue #$ISSUE_NUMBER ($ISSUE_TITLE) deleted by @$SENDER. Dashboard will refresh via workflow_run."
