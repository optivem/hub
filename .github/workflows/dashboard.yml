name: dashboard

# Model A — Cloudflare Pages builds the dashboard. This workflow's only job is
# to POST the Cloudflare deploy hook so CF rebuilds (running generate-dashboard
# on CF, pulling fresh board data). The generated HTML never enters git.
#
# No `push` trigger: Cloudflare already rebuilds automatically on every push to
# the production branch, so we only need to nudge it on the *non-push* events
# (ticket lifecycle + discussions) plus a periodic safety-net refresh.

on:
  workflow_run:
    workflows:
      - auto-on-created
      - auto-on-closed
      - auto-on-comment
      - auto-on-deleted
      - auto-on-edited
      - auto-on-reopened
    types: [completed]
  discussion:
    types: [pinned, unpinned, edited, deleted]
  schedule:
    - cron: '*/30 * * * *'  # safety-net refresh every 30 minutes
  workflow_dispatch:

permissions:
  contents: read

# Serialize but never cancel in-flight: each event must converge the dashboard
# to latest. Hook pings are cheap, so queue rather than cancel.
concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Pages to rebuild
        env:
          HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          test -n "$HOOK" || { echo "::error::CF_DEPLOY_HOOK secret not set"; exit 1; }
          curl -fsS -X POST "$HOOK" -o /dev/null -w "deploy hook POST -> HTTP %{http_code}\n"
