name: Remove Assignee
description: Removes an assignee from an issue.

inputs:
  issue-number:
    description: The issue number.
    required: true
  assignee:
    description: The GitHub username to remove.
    required: true

runs:
  using: composite
  steps:
    - name: Remove assignee
      uses: actions/github-script@v9
      env:
        # Pass inputs via env (NOT interpolated into the script) so values
        # can't break or inject JS.
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        ASSIGNEE: ${{ inputs.assignee }}
      with:
        script: |
          await github.rest.issues.removeAssignees({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: Number(process.env.ISSUE_NUMBER),
            assignees: [process.env.ASSIGNEE]
          });
