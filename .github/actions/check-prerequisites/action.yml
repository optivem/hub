name: Check Module Prerequisites
description: Verifies that all milestones in the previous module are "Done" before allowing a new ticket.

inputs:
  project-key:
    description: The project key (e.g. "eshp").
    required: true
  course-id:
    description: The course id (e.g. "atdd", "pipeline").
    required: true
  module-num:
    description: The module number (e.g. "2").
    required: true
  github-token:
    description: Token with project read access.
    required: true

outputs:
  allowed:
    description: "'true' if the previous module is complete or this is module 1."
    value: ${{ steps.check.outputs.allowed }}
  missing-milestones:
    description: "Comma-separated list of incomplete milestones from the previous module."
    value: ${{ steps.check.outputs.missing_milestones }}

runs:
  using: composite
  steps:
    - name: Check prerequisites
      id: check
      uses: actions/github-script@v8
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { loadConfig } = require('./scripts/load-config.cjs');
          const config = loadConfig('.');
          const projectKey = '${{ inputs.project-key }}'.toLowerCase();
          const courseId = '${{ inputs.course-id }}';
          const moduleNum = '${{ inputs.module-num }}';
          const projectId = config.board.id;

          const course = config.courses.find(c => c.id === courseId);
          if (!course) {
            core.setOutput('allowed', 'true');
            core.setOutput('missing_milestones', '');
            return;
          }

          // Find current module index
          const moduleIndex = course.modules.findIndex(m => m.number === moduleNum);
          if (moduleIndex <= 0) {
            // First module or not found — no prerequisites
            core.setOutput('allowed', 'true');
            core.setOutput('missing_milestones', '');
            return;
          }

          const prevModule = course.modules[moduleIndex - 1];
          const prevMilestones = prevModule.milestones || [];
          if (prevMilestones.length === 0) {
            core.setOutput('allowed', 'true');
            core.setOutput('missing_milestones', '');
            return;
          }

          // Find all issues for the previous module + this project
          const projectLabel = `project-${projectKey}`;
          const courseLabel = `course-${courseId}`;
          const moduleLabel = `module-${prevModule.label || prevModule.number}`;

          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: `${projectLabel},${courseLabel},${moduleLabel}`,
            state: 'all',
            per_page: 100
          });

          // Build a map of milestone label → issue node ID
          const milestoneIssueMap = {};
          for (const issue of issues.data) {
            const milestoneLabel = issue.labels.find(l => /^milestone-.+/.test(l.name));
            if (milestoneLabel) {
              const milestoneKey = milestoneLabel.name.replace('milestone-', '');
              milestoneIssueMap[milestoneKey] = issue.node_id;
            }
          }

          // Check each milestone in the previous module
          const incompleteMilestones = [];
          for (const milestone of prevMilestones) {
            const nodeId = milestoneIssueMap[milestone.label || milestone.number];
            if (!nodeId) {
              incompleteMilestones.push(`${prevModule.number}.${milestone.number} - ${milestone.name}`);
              continue;
            }

            // Query project board status
            const result = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        project { id }
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { issueId: nodeId });

            const item = result.node.projectItems.nodes.find(n => n.project.id === projectId);
            const status = item?.fieldValueByName?.name || '';
            if (status !== 'Done') {
              incompleteMilestones.push(`${prevModule.number}.${milestone.number} - ${milestone.name}`);
            }
          }

          if (incompleteMilestones.length === 0) {
            core.setOutput('allowed', 'true');
            core.setOutput('missing_milestones', '');
          } else {
            core.setOutput('allowed', 'false');
            core.setOutput('missing_milestones', incompleteMilestones.join(', '));
          }
