name: Update Issue
description: Updates an issue title and body with project overview and checklist.

inputs:
  issue-number:
    description: The issue number.
    required: true
  project-key:
    description: The project key (e.g. ESHP).
    required: true
  project-name:
    description: The project name.
    required: true
  repo-url:
    description: The project repository URL.
    required: true
  course-id:
    description: The course id (e.g. "atdd", "pipeline").
    required: true
  module:
    description: The selected module string (e.g. "02 - Smoke Tests").
    required: true
  milestone:
    description: The selected milestone string (e.g. "01 - Smoke Tests").
    required: false

runs:
  using: composite
  steps:
    - name: Update title and body
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          const { loadConfig } = require('./scripts/load-config.cjs');
          const projectKey = '${{ inputs.project-key }}';
          const projectName = '${{ inputs.project-name }}';
          const repoUrl = '${{ inputs.repo-url }}';
          const selectedModule = '${{ inputs.module }}';
          const selectedMilestone = '${{ inputs.milestone }}';
          const moduleNum = selectedModule.split(' - ')[0];
          const milestoneNum = selectedMilestone ? selectedMilestone.split(' - ')[0] : '';

          const courseId = '${{ inputs.course-id }}';
          const config = loadConfig('.');
          const course = config.courses.find(c => c.id === courseId);
          const courseName = course ? course.name : courseId;

          const milestoneName = selectedMilestone ? selectedMilestone.replace(/^\d+\s*-\s*/, '') : '';
          const compositeId = selectedMilestone
            ? `${projectKey}-${courseId.toUpperCase()}-${moduleNum}.${milestoneNum}`
            : `${projectKey}-${courseId.toUpperCase()}-${moduleNum}`;
          const newTitle = selectedMilestone
            ? `${compositeId} | ${milestoneName}`
            : `${compositeId} | ${selectedModule}`;

          let body = `## Overview\n\n`;
          body += `**Project:** [${projectName}](${repoUrl})\n`;
          body += `**Course:** ${courseName}\n`;
          body += `**Module:** ${selectedModule}\n`;
          if (selectedMilestone) {
            body += `**Milestone:** ${selectedMilestone}\n`;
          }
          const checklistPath = selectedMilestone
            ? `checklists/${courseId}/${moduleNum}/${milestoneNum}.md`
            : `checklists/${courseId}/${moduleNum}.md`;
          if (fs.existsSync(checklistPath)) {
            const checklist = fs.readFileSync(checklistPath, 'utf8').trim();
            body += `\n## Review Checklist\n\n${checklist}`;
          }

          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ inputs.issue-number }},
            title: newTitle,
            body
          });
