name: Update Issue
description: Updates an issue title and body with project overview and checklist.

inputs:
  issue-number:
    description: The issue number.
    required: true
  project-key:
    description: The project key (e.g. ESHP).
    required: true
  project-name:
    description: The project name.
    required: true
  repo-url:
    description: The project repository URL.
    required: true
  course-id:
    description: The course id (e.g. "atdd", "pipeline").
    required: true
  module:
    description: The selected module string (e.g. "02 - Smoke Tests").
    required: true

runs:
  using: composite
  steps:
    - name: Update title and body
      uses: actions/github-script@v9
      env:
        # Pass inputs via env (NOT interpolated into the script) so values
        # containing quotes/apostrophes/backticks can't break or inject JS.
        PROJECT_KEY: ${{ inputs.project-key }}
        PROJECT_NAME: ${{ inputs.project-name }}
        REPO_URL: ${{ inputs.repo-url }}
        SELECTED_MODULE: ${{ inputs.module }}
        COURSE_ID: ${{ inputs.course-id }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
      with:
        script: |
          const fs = require('fs');
          const { loadConfig } = require('./scripts/load-config.cjs');
          const projectKey = process.env.PROJECT_KEY;
          const projectName = process.env.PROJECT_NAME;
          const repoUrl = process.env.REPO_URL;
          const selectedModule = process.env.SELECTED_MODULE;
          const moduleNum = selectedModule.split(' - ')[0];

          const courseId = process.env.COURSE_ID;
          const config = loadConfig('.');
          const course = config.courses.find(c => c.id === courseId);
          const courseName = course ? course.name : courseId;

          const compositeId = `${projectKey}-${courseId.toUpperCase()}-${moduleNum}`;
          const newTitle = `${compositeId} | ${selectedModule}`;

          let body = `## Overview\n\n`;
          body += `**Project:** [${projectName}](${repoUrl})\n`;
          body += `**Course:** ${courseName}\n`;
          body += `**Module:** ${selectedModule}\n`;
          const checklistPath = `checklists/${courseId}/${moduleNum}.md`;
          if (fs.existsSync(checklistPath)) {
            const checklist = fs.readFileSync(checklistPath, 'utf8').trim();
            body += `\n## Review Checklist\n\n${checklist}`;
          }

          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: Number(process.env.ISSUE_NUMBER),
            title: newTitle,
            body
          });
