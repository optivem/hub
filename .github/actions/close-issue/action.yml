name: Close Issue
description: Closes an issue with a comment explaining why.

inputs:
  issue-number:
    description: The issue number.
    required: true
  body:
    description: The comment body (markdown).
    required: true
  title:
    description: "New title for the issue (optional)."
    required: false
    default: ""
  state-reason:
    description: "The close reason (completed or not_planned)."
    required: false
    default: not_planned

runs:
  using: composite
  steps:
    - name: Comment and close
      uses: actions/github-script@v9
      env:
        # All inputs via env (never interpolated into the script) — the title is
        # user-controlled (the issue title), so inlining it could break/inject JS.
        INPUT_BODY: ${{ inputs.body }}
        INPUT_TITLE: ${{ inputs.title }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        STATE_REASON: ${{ inputs.state-reason }}
      with:
        script: |
          const issueNumber = Number(process.env.ISSUE_NUMBER);
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            body: process.env.INPUT_BODY
          });

          const updateParams = {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            state: 'closed',
            state_reason: process.env.STATE_REASON
          };
          const newTitle = process.env.INPUT_TITLE;
          if (newTitle) updateParams.title = newTitle;
          await github.rest.issues.update(updateParams);
