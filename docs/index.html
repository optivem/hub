<!DOCTYPE html>
<!--
  Static "moved" page served at optivem.github.io/hub.
  The live dashboard now lives on Cloudflare Pages.
  TODO: when the custom domain is live, change the two URLs below from
        https://optivem-learn.pages.dev/  ->  https://learn.optivem.com/
  (This page only serves until hub goes private 2026-07-02, after which
   GitHub Pages stops serving it on the Free plan.)
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Optivem Hub has moved</title>
  <meta http-equiv="refresh" content="4; url=https://optivem-learn.pages.dev/" />
  <link rel="canonical" href="https://optivem-learn.pages.dev/" />
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a; color: #e2e8f0; text-align: center; padding: 1.5rem;
    }
    .card {
      max-width: 32rem; background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 2.5rem 2rem; box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
    p { margin: .5rem 0; line-height: 1.6; color: #cbd5e1; }
    a.btn {
      display: inline-block; margin-top: 1.25rem; padding: .75rem 1.5rem;
      background: #38bdf8; color: #0f172a; font-weight: 600; text-decoration: none;
      border-radius: 10px;
    }
    a.btn:hover { background: #7dd3fc; }
    .muted { font-size: .85rem; color: #94a3b8; margin-top: 1.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📦 The Optivem Hub dashboard has moved</h1>
    <p>You'll be redirected automatically. If nothing happens, use the button below.</p>
    <a class="btn" href="https://optivem-learn.pages.dev/">Go to the new dashboard →</a>
    <p class="muted">Please update your bookmark to the new address.</p>
  </div>
</body>
</html>
